<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khumbuka Offline</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root { color-scheme: light; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f4f7fb; color: #0f172a; }
    .card { width: min(92vw, 460px); background: #fff; border: 1px solid #e5e7eb; border-radius: 24px; padding: 28px; box-shadow: 0 18px 50px rgba(15, 23, 42, .10); }
    .logo { width: 56px; height: 56px; border-radius: 18px; display: grid; place-items: center; background: #0f172a; color: #fff; font-weight: 900; font-size: 26px; margin-bottom: 18px; }
    h1 { margin: 0 0 10px; font-size: 26px; letter-spacing: -.02em; }
    p { margin: 0 0 18px; color: #64748b; line-height: 1.55; }
    button { border: 0; border-radius: 14px; background: #2563eb; color: #fff; padding: 12px 16px; font-weight: 800; cursor: pointer; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">K</div>
    <h1>You are offline</h1>
    <p>Khumbuka needs internet to sync Supabase data. Static screens may load from cache, but live products, sales, expenses, and analytics need connection.</p>
    <button onclick="window.location.reload()">Try again</button>
  </main>
</body>
</html>
